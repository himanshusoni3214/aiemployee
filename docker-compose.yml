services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voryx_ops}
      POSTGRES_USER: ${POSTGRES_USER:-voryx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voryx_password}
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ./backend
    env_file: .env
    depends_on: [db, redis]
    ports: ["8000:8000"]
  worker:
    build: ./backend
    env_file: .env
    depends_on: [db, redis, backend]
    command: python -m app.workers.job_runner
  scheduler:
    build: ./backend
    env_file: .env
    depends_on: [db, redis, backend]
    command: python -m app.workers.scheduler
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on: [backend]
    ports: ["3000:3000"]
volumes:
  postgres_data:
